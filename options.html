<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>interpres Settings</title>
    <link rel="stylesheet" href="settings.css" />
  </head>
  <body class="settings-body">
    <main class="settings-shell">
      <section class="settings-card">
        <div class="settings-glow"></div>
        <div class="settings-topbar">
          <div>
            <p class="settings-eyebrow">interpres</p>
            <h1 class="settings-title">Translation Settings</h1>
          </div>
        </div>

        <p class="settings-description">
          Control the language used for translation and explanation across the extension.
        </p>

        <form id="settings-form" class="settings-form">
          <section class="settings-panel">
            <div class="settings-panel-head">
              <h2 class="settings-panel-title">Translate Language</h2>
            </div>
            <div class="settings-picker" data-setting="translateLanguage">
              <button
                id="translateLanguageTrigger"
                type="button"
                class="settings-picker-trigger"
                aria-expanded="false"
                aria-haspopup="listbox"
              >
                <span class="settings-picker-value">English</span>
                <span class="settings-picker-icon">⌄</span>
              </button>
              <div class="settings-picker-popover" hidden>
                <div class="settings-picker-search-wrap">
                  <input
                    class="settings-picker-search"
                    type="search"
                    placeholder="Search language"
                    autocomplete="off"
                  />
                </div>
                <div class="settings-picker-list" role="listbox"></div>
              </div>
            </div>
          </section>

          <div class="settings-actions">
            <button type="submit" class="settings-save">Save settings</button>
            <div class="settings-status" id="status" aria-live="polite"></div>
          </div>
        </form>
      </section>
    </main>

    <script src="settings-shared.js"></script>
    <script src="options.js"></script>
  </body>
</html>
