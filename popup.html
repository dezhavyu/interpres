<!DOCTYPE html>
<html lang="en" class="settings-html-popup">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>interpres</title>
    <link rel="stylesheet" href="settings.css" />
  </head>
  <body class="settings-body settings-body-popup">
    <main class="settings-shell settings-shell-popup">
      <section class="settings-card settings-card-popup">
        <div class="settings-glow"></div>
        <div class="settings-topbar">
          <div>
            <p class="settings-eyebrow">interpres</p>
            <h1 class="settings-title">Quick Settings</h1>
          </div>
        </div>

        <form id="settings-form" class="settings-form settings-form-popup">
          <section class="settings-panel">
            <div class="settings-panel-head">
              <h2 class="settings-panel-title">Translate Language</h2>
            </div>
            <div class="settings-picker" data-setting="translateLanguage">
              <button
                id="translateLanguageTrigger"
                type="button"
                class="settings-picker-trigger"
                aria-expanded="false"
                aria-haspopup="listbox"
              >
                <span class="settings-picker-value">English</span>
                <span class="settings-picker-icon">⌄</span>
              </button>
              <div class="settings-picker-popover" hidden>
                <div class="settings-picker-search-wrap">
                  <input
                    class="settings-picker-search"
                    type="search"
                    placeholder="Search language"
                    autocomplete="off"
                  />
                </div>
                <div class="settings-picker-list" role="listbox"></div>
              </div>
            </div>
          </section>

          <div class="settings-actions settings-actions-popup">
            <button type="submit" class="settings-save">Save</button>
            <a href="options.html" target="_blank" class="settings-link">Open full settings</a>
          </div>
          <div class="settings-status settings-status-popup" id="status" aria-live="polite"></div>
        </form>
      </section>
    </main>

    <script src="settings-shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
